apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reverse-proxy
  template:
    metadata:
      labels:
        app: reverse-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "150m"
            memory: "64Mi"
      volumes:
      - name: nginx-config
        configMap:
          name: reverse-proxy-config
