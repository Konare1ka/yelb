apiVersion: apps/v1
kind: Deployment
metadata:
  name: yelb-appserver
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yelb-appserver
      tier: middletier
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: yelb-appserver
        tier: middletier
    spec:
      # There isn't runAsNonRoot since all containers are started under root
      containers:
      - name: yelb-appserver
        image: konare1ka/yelb-appserver:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4567
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
